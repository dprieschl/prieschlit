<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>prieschl:it — coming soon</title>
<meta name="description" content="IT-Dienstleistungen für EPUs, kleine Büros und Privatpersonen in Linz. Bald online.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ice:      #7DDFFF;
  --ice-dim:  #3BBDE0;
  --ice-glow: rgba(125, 223, 255, 0.10);
  --dark:     #080C10;
  --dark-3:   #131B22;
  --dark-4:   #1A2530;
  --text:     #E8F4F8;
  --text-dim: #7A9BAD;
}

html, body {
  height: 100%;
}

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* noise */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.35;
}

/* ambient glow */
body::after {
  content: '';
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70vmax;
  height: 70vmax;
  background: radial-gradient(ellipse at center, rgba(125,223,255,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 2rem;
  max-width: 580px;
  width: 100%;
  animation: fadeUp 1s ease both;
}

/* top tag */
.tag {
  font-size: 0.65rem;
  letter-spacing: 0.22em;
  color: var(--ice);
  margin-bottom: 2.5rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.tag::before {
  content: '';
  display: block;
  width: 28px;
  height: 1px;
  background: var(--ice);
}

/* wordmark */
.wordmark {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(3rem, 10vw, 5.5rem);
  line-height: 0.9;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 0.15em;
}
.wordmark span {
  color: var(--ice);
  position: relative;
  display: inline-block;
}
.wordmark span::after {
  content: attr(data-text);
  position: absolute;
  left: 3px;
  top: 0;
  color: rgba(125,223,255,0.2);
  clip-path: polygon(0 30%, 100% 30%, 100% 55%, 0 55%);
  animation: glitch 6s infinite 2.5s;
  pointer-events: none;
}

@keyframes glitch {
  0%, 94%, 100% { transform: none; opacity: 0; }
  95% { transform: translateX(-4px); opacity: 1; }
  96% { transform: translateX(4px); opacity: 0.5; }
  97% { transform: none; opacity: 0; }
}

/* divider */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, rgba(125,223,255,0.3), transparent);
  margin: 2rem 0;
}

/* status line */
.status-line {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-bottom: 1.75rem;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ice);
  box-shadow: 0 0 8px var(--ice);
  animation: pulse 2.5s infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--ice); }
  50%       { opacity: 0.4; box-shadow: 0 0 3px var(--ice); }
}

/* services teaser */
.services {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 2.5rem;
}
.service-chip {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  border: 1px solid rgba(125,223,255,0.12);
  padding: 0.3rem 0.7rem;
  border-radius: 1px;
  transition: border-color 0.2s, color 0.2s;
}
.service-chip:hover {
  border-color: rgba(125,223,255,0.35);
  color: var(--ice);
}

/* contact */
.contact-line {
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.contact-line a {
  color: var(--ice-dim);
  text-decoration: none;
  transition: color 0.2s;
}
.contact-line a:hover { color: var(--ice); text-decoration: underline; }
.contact-line .sep {
  color: rgba(125,223,255,0.2);
  margin: 0 0.25rem;
}

/* bottom corner */
.corner {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 1;
  opacity: 0.08;
  animation: fadeIn 1.5s ease 0.8s both;
  pointer-events: none;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 0.08; }
}

@media (max-width: 500px) {
  .corner { display: none; }
  .wordmark { font-size: 3rem; }
}
</style>
</head>
<body>

<div class="container">
  <div class="tag">it-dienstleistungen · linz</div>

  <div class="wordmark">
    prieschl<span data-text=":it">:it</span>
  </div>

  <div class="divider"></div>

  <div class="status-line">
    <div class="status-dot"></div>
    <span>website in aufbau — anfragen schon jetzt willkommen</span>
  </div>

  <div class="services">
    <span class="service-chip">it-support</span>
    <span class="service-chip">server & nas</span>
    <span class="service-chip">netzwerk & wlan</span>
    <span class="service-chip">backup & dsgvo</span>
    <span class="service-chip">webdesign</span>
    <span class="service-chip">europäische dienste</span>
  </div>

  <div class="contact-line">
    <span>kontakt</span>
    <span class="sep">//</span>
    <a href="mailto:office@prieschl-it.at">office@prieschl-it.at</a>
  </div>
</div>

<!-- deco grid -->
<div class="corner">
  <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#7DDFFF" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="200" height="200" fill="url(#g)"/>
    <rect x="60" y="60" width="100" height="100" fill="none" stroke="#7DDFFF" stroke-width="1.5"/>
    <rect x="80" y="80" width="60" height="60" fill="rgba(125,223,255,0.07)" stroke="#7DDFFF" stroke-width="0.8"/>
    <circle cx="60" cy="60" r="3" fill="#7DDFFF"/>
    <circle cx="160" cy="60" r="3" fill="#7DDFFF"/>
    <circle cx="160" cy="160" r="3" fill="#7DDFFF"/>
    <circle cx="60" cy="160" r="3" fill="#7DDFFF"/>
  </svg>
</div>

</body>
</html>
